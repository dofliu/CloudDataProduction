# 課堂場景(60+ 人可各認一間公司,期中前個人作業)。
# ⚠ 全為合成(synthetic)教學資料,非任何真實公司產線;公司名為教學代號。
# 每間至少 1 台 producer(會生產/退化),部分配 1 台公用設備。協定定址由引擎自動配。
park:
  name: "智慧工業區 · 課堂版(64 廠)"
  sim:
    tick_hz: 2
    time_multiplier: 120
    broadcast_interval_s: 5
  mes: {enabled: true}
  protocol_mode: channel_mux
  ports: {modbus: 6020, opcua: 6041, mqtt: 6083}

  companies:
    - id: c01
      name: "教學廠 01"
      industry: machine_tool
      product: "CNC 加工中心"
      intro: "課堂教學用合成廠(#01);主力 CNC 加工中心。"
      devices:
        - {id: d001, template: cnc_machining_center}

    - id: c02
