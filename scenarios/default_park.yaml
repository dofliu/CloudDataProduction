# 勤益智慧工業區 —— 取材自台中工業區 / 精密機械聚落代表廠商(22 間公司、~45 台設備)。
#
# ⚠ 公司名稱與「主要產品」為公開資訊;本園區的設備、數據、運轉狀態全為合成(synthetic),
#   並非任何公司的真實產線或量測值,僅供教學。
#
# 設備只需寫 id + template:協定定址(unit_id / node / topic)由引擎自動遞增配,
# 退化參數未指定時用 template 預設並做個體差異抖動(見 engine/templates/_common.py)。
park:
  name: "勤益智慧工業區(台中精密機械主題)"
  sim:
    tick_hz: 2                 # 引擎每秒步進 2 次,每步 = 1 模擬分鐘(退化積分維持細緻度)
    time_multiplier: 120       # 1 真實秒 = 2 模擬分鐘
    broadcast_interval_s: 5    # telemetry / 資料每 5 真實秒才推一次 = 一次跳 10 模擬分鐘(畫面平靜;動畫走前端 ticker 仍滑順)
  protocol_mode: channel_mux
  ports: {modbus: 502, opcua: 4840, mqtt: 1883}

  companies:
    - id: c01
      name: "台中精機"
      industry: machine_tool
      product: "CNC 車床、加工中心、塑膠射出成型機"
      intro: "成立於 1954 年,華人圈精密機械指標品牌之一;產品橫跨工具機與塑膠射出機,2019 年於台中精密機械園區啟用全球營運總部。"
      devices:
        - {id: cnc-01, template: cnc_machining_center}
        - {id: im-01, template: injection_molding}

    - id: c02
      name: "友嘉實業"
      industry: machine_tool
      product: "綜合加工中心、車削中心"
      intro: "友嘉集團(FFG)以併購擴張,為全球前列工具機集團,台灣工具機業少數年營收破 500 億元者。"
      devices:
        - {id: cnc-02, template: cnc_machining_center}
        - {id: cnc-03, template: cnc_machining_center, duty_cycle: {profile: two_shift}}

    - id: c03
      name: "東台精機"
      industry: machine_tool
      product: "CNC 加工機、放電加工機、航太加工"
      intro: "東台集團(Tongtai),工具機與放電加工大廠,跨足航太、能源與半導體設備。"
      devices:
        - {id: cnc-04, template: cnc_machining_center}
        - {id: cnc-05, template: cnc_machining_center}

    - id: c04
      name: "永進機械"
