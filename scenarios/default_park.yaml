      intro: "YCM,專注高剛性綜合加工中心與五軸機,外銷全球。"
      devices:
        - {id: cnc-06, template: cnc_machining_center}
        - {id: cnc-07, template: cnc_machining_center}

    - id: c05
      name: "上銀科技"
